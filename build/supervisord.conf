[supervisord]
nodaemon=true
user=root
logfile=/dev/null
pidfile=/var/run/supervisord.pid
loglevel=info

[program:gcopy-backend]
command=/app/backend/start.sh
directory=/app/backend
autostart=true
autorestart=true
startretries=3
startsecs=5
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0

[program:gcopy-frontend]
command=/app/frontend/start.sh
directory=/app/frontend
autostart=true
autorestart=true
startretries=3
startsecs=5
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
