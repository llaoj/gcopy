[supervisord]
nodaemon=true
user=root
logfile=/dev/null
pidfile=/var/run/supervisord.pid
loglevel=info

[program:gcopy-backend]
command=/app/backend/start.sh
directory=/app/backend
autostart=true
autorestart=true
startretries=3
startsecs=5
# Output to stdout/stderr for Docker logs
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
# Supervisor automatically adds process name prefix to logs

[program:gcopy-frontend]
command=node server.js
directory=/app/frontend
autostart=true
autorestart=true
startretries=3
startsecs=5
# Output to stdout/stderr for Docker logs
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
# Supervisor automatically adds process name prefix to logs
